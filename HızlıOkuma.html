<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="description" content="Hızlı Okuma aracı — metni kelime kelime göstererek odaklanmanı artıran ve WPM ayarlı modern RSVP okuma aracı." />
<meta name="keywords" content="hızlı okuma, rsvp okuma, wpm, okuma hızı, reading speeder">
<title>Hızlı Okuma | RSVP Reading Speeder</title>
<style>
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', sans-serif;
    transition: all 0.3s ease;
}

body {
    background: white;
    color: black;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
}

.dark {
    background: #0d0d0d;
    color: white;
}

.container {
    width: 50%;
    max-width: 1400px;   /* Increased from 1000px */
    margin: auto;
    padding: 40px 20px;
    text-align: center;
}

h1 {
    font-size: 44px;
    margin-bottom: 30px;
    background: linear-gradient(90deg, #111, #666, #111);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.dark h1 {
    background: linear-gradient(90deg, #fff, #999, #fff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* TEXTAREA */
textarea {
    width: 100%;
    height: 230px;
    border-radius: 16px;
    padding: 20px;
    font-size: 16px;
    resize: none;
    outline: none;
    border: 1px solid rgba(0,0,0,0.15);
    background: white;
    color: black;
}

textarea:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

textarea:focus {
    box-shadow: 0 12px 30px rgba(0,0,0,0.15);
}

.dark textarea {
    background: #111;
    color: white;
    border: 1px solid rgba(255,255,255,0.1);
}

.dark textarea:hover {
    box-shadow: 0 10px 25px rgba(255,255,255,0.05);
}

/* CONTROLS */
.controls {
    margin-top: 30px;
}

/* GLASS BUTTON STYLE */
button {
    background: rgba(0, 0, 0, 0.08);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(0,0,0,0.15);
    color: black;
    padding: 11px 22px;
    border-radius: 14px;
    margin: 6px;
    cursor: pointer;
}

button:hover {
    transform: translateY(-3px);
    background: rgba(0,0,0,0.12);
}

.dark button {
    background: rgba(255, 255, 255, 0.08);
    border: 1px solid rgba(255,255,255,0.15);
    color: white;
}

.dark button:hover {
    background: rgba(255,255,255,0.15);
}

/* SELECT */
select {
    padding: 10px;
    border-radius: 10px;
    border: 1px solid rgba(0,0,0,0.15);
    margin-right: 10px;
}

/* READER */
#readerArea {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 260px;
    margin-top: 60px;
}

#wordDisplay {
    font-size: 64px;
    font-weight: 500;
    letter-spacing: 1px;
}

#progress {
    margin-top: 15px;
    font-size: 14px;
    opacity: 0.6;
}

/* MOON BUTTON */
.top-bar {
    display: flex;
    justify-content: flex-end;
    padding: 15px 20px;
}

.theme-toggle {
    width: 45px;
    height: 45px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    position: relative;
    background: rgba(0,0,0,0.1);
}

.theme-toggle::before {
    content: "";
    width: 20px;
    height: 20px;
    background: black;
    border-radius: 50%;
    position: absolute;
    top: 12px;
    left: 12px;
}

.theme-toggle::after {
    content: "";
    width: 20px;
    height: 20px;
    background: white;
    border-radius: 50%;
    position: absolute;
    top: 12px;
    left: 18px;
}

.dark .theme-toggle::before {
    background: white;
}

.dark .theme-toggle::after {
    background: #0d0d0d;
}

.theme-toggle:hover {
    transform: rotate(20deg) scale(1.1);
}

/* FOOTER */
footer {
    margin-top: auto;
    padding: 15px 20px;
    font-size: 13px;
    text-align: center;
    border-top: 1px solid rgba(0,0,0,0.1);
}

.dark footer {
    border-top: 1px solid rgba(255,255,255,0.1);
}

footer a {
    text-decoration: none;
    color: inherit;
}

.signature {
    position: fixed;
    bottom: 15px;
    right: 20px;
    font-size: 13px;
    opacity: 0.6;
}

.orp {
    color: #e10600;
    font-weight: 700;
}

/*  Mobile */
@media (max-width: 1024px) {
    .container {
        width: 80%;
    }
}

@media (max-width: 768px) {
    .container {
        width: 92%;
        padding: 30px 15px;
    }

    textarea {
        height: 180px;
    }

    button {
        width: 100%;
    }

    select {
        width: 100%;
    }

    #readerArea {
        margin-top: 40px;
    }
}

@media (max-width: 480px) {

    h1 {
        margin-bottom: 20px;
    }

    #wordDisplay {
        font-size: clamp(48px, 12vw, 90px);
    }

    textarea {
        height: 160px;
    }
}
</style>
</head>
<body>

<div class="top-bar">
    <button class="theme-toggle" onclick="toggleTheme()"></button>
</div>

<div class="container">
    <h1>Hızlı Okuma</h1>

    <textarea id="textInput" placeholder="Metni buraya yapıştırın..."></textarea>

    <div class="controls">
        <label>WPM:</label>
        <select id="wpmSelect"></select>

        <button onclick="startReading()">Başlat</button>
        <button onclick="pauseReading()">Duraklat</button>
        <button onclick="resetReading()">Sıfırla</button>
    </div>

    <div id="readerArea">
        <div id="wordDisplay"></div>
    </div>

    <div id="progress"></div>
</div>

<footer>
    © 2026 Kutay Sönmez. All rights reserved. |
    <a href="https://www.linkedin.com/in/kutay-sonmez-144296256/" target="_blank">
        LinkedIn
    </a>
</footer>

<div class="signature">
    Made by Kutay
</div>

<script>
function getORPIndex(word) {
    const length = word.length;

    if (length <= 1) return 0;
    if (length <= 5) return 1;
    if (length <= 9) return 2;
    if (length <= 13) return 3;

    return Math.floor(length * 0.35);
}
let words = [];
let currentIndex = 0;
let interval;

const select = document.getElementById("wpmSelect");

for (let i = 200; i <= 1000; i += 50) {
    const option = document.createElement("option");
    option.value = i;
    option.textContent = i + " WPM";
    if (i === 200) option.selected = true;
    select.appendChild(option);
}

function startReading() {
    if (currentIndex === 0) {
        const text = document.getElementById("textInput").value;
        words = text.trim().split(/\s+/);
    }

    if (words.length === 0) {
        alert("Please paste text.");
        return;
    }

    clearInterval(interval);

    const wpm = parseInt(select.value);
    const intervalTime = 60000 / wpm;

    interval = setInterval(() => {
        if (currentIndex >= words.length) {
            clearInterval(interval);
            return;
        }

            let word = words[currentIndex];
let index = getORPIndex(word);

word =
    word.slice(0, index) +
    "<span class='orp'>" +
    word[index] +
    "</span>" +
    word.slice(index + 1);

document.getElementById("wordDisplay").innerHTML = word;
        document.getElementById("progress").innerText =
            (currentIndex + 1) + " / " + words.length + " words";

        currentIndex++;
    }, intervalTime);
}

function pauseReading() {
    clearInterval(interval);
}

function resetReading() {
    clearInterval(interval);
    currentIndex = 0;
    document.getElementById("wordDisplay").innerText = "";
    document.getElementById("progress").innerText = "";
}

function toggleTheme() {
    document.body.classList.toggle("dark");
}

</script>

</body>
</html>
